<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMZON - Tienda Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="seccion-auth" class="auth-container">
        <div class="auth-card">
            <h2 id="titulo-auth">Iniciar Sesión</h2>
            <div class="form-group">
                <input type="text" id="usuario" placeholder="Usuario">
                <input type="password" id="password" placeholder="Contraseña">
            </div>
            <button id="btn-login" class="btn-primary">Entrar</button>
            <button id="btn-toggle" class="btn-link">Crear cuenta nueva</button>
        </div>
    </div>

    <div id="interfaz-tienda" class="main-app" style="display: none;">
        <header class="navbar">
            <div class="logo">AMZON</div>
            <div class="user-info">
                <span id="nombre-usuario-display"></span>
                <button id="btn-logout" class="btn-danger">Cerrar Sesión</button>
            </div>
        </header>

        <main class="content">
            <section class="products-section">
                <h3>Catálogo de Productos</h3>
                <div id="catalogo" class="grid-productos">
                    </div>
            </section>

            <aside class="cart-section">
                <h3>Tu Carrito</h3>
                <div id="lista-carrito" class="cart-items">
                    </div>
                <div class="cart-footer">
                    <p>Total: <strong>$<span id="total-precio">0</span></strong></p>
                    <button id="btn-comprar" class="btn-success">Finalizar Compra</button>
                </div>
            </aside>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
